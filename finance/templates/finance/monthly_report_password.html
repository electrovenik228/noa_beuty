{% extends "base.html" %}
{% block title %}Доступ к финансовому отчёту{% endblock %}
{% block extra_head %}
<style>
    .access-card {
        max-width: 520px;
        margin: 30px auto;
        background: #ffffff;
        border: 1px solid #e0e0e0;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
    }
    .access-card input {
        border-radius: 8px;
    }
</style>
{% endblock %}
{% block content %}
<div class="access-card">
    <h4 class="mb-2">Доступ к финансовому отчёту</h4>
    <p class="text-muted mb-3">Введите пароль, чтобы открыть месячные показатели.</p>
    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="post" autocomplete="off">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-semibold">Пароль</label>
            <input type="password" name="password" class="form-control form-control-lg" placeholder="Введите пароль" autofocus required>
        </div>
        <button class="btn btn-primary w-100">Войти</button>
    </form>
    </div>
{% endblock %}
